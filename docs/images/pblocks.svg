<svg width="100%" viewBox="215 35 250 250" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>pblocks icon</title>
  <desc>An icon for pblocks: a partial split structure with one isolated lattice block at the top-left and a diagonally adjacent pooled block composed of stacked layers at the bottom-right.</desc>

  <rect x="220" y="40" width="240" height="240" rx="48" fill="#0f172a"/>

  <!-- Block 1: isolated lattice block, top-left -->
  <rect x="230" y="60" width="95" height="95" rx="16" fill="#60a5fa" opacity="0.22"/>
  <line x1="252" y1="82"  x2="303" y2="82"  stroke="#60a5fa" stroke-width="2.2"/>
  <line x1="252" y1="133" x2="303" y2="133" stroke="#60a5fa" stroke-width="2.2"/>
  <line x1="252" y1="82"  x2="252" y2="133" stroke="#60a5fa" stroke-width="2.2"/>
  <line x1="303" y1="82"  x2="303" y2="133" stroke="#60a5fa" stroke-width="2.2"/>
  <circle cx="252" cy="82"  r="6" fill="#bfdbfe"/>
  <circle cx="303" cy="82"  r="6" fill="#bfdbfe"/>
  <circle cx="252" cy="133" r="6" fill="#bfdbfe"/>
  <circle cx="303" cy="133" r="6" fill="#bfdbfe"/>

  <!-- Block 2: stack of 5 layers, diagonally adjacent at bottom-right -->
  <rect x="325" y="155" width="95" height="95" rx="16" fill="#60a5fa" opacity="0.08" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.40"/>
  <rect x="331" y="161" width="95" height="95" rx="16" fill="#60a5fa" opacity="0.11" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.55"/>
  <rect x="337" y="167" width="95" height="95" rx="16" fill="#60a5fa" opacity="0.14" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.70"/>
  <rect x="343" y="173" width="95" height="95" rx="16" fill="#60a5fa" opacity="0.17" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.80"/>

  <!-- Front layer with lattice -->
  <rect x="349" y="179" width="95" height="95" rx="16" fill="#60a5fa" opacity="0.22"/>
  <line x1="371" y1="201" x2="422" y2="201" stroke="#60a5fa" stroke-width="2.2"/>
  <line x1="371" y1="252" x2="422" y2="252" stroke="#60a5fa" stroke-width="2.2"/>
  <line x1="371" y1="201" x2="371" y2="252" stroke="#60a5fa" stroke-width="2.2"/>
  <line x1="422" y1="201" x2="422" y2="252" stroke="#60a5fa" stroke-width="2.2"/>
  <circle cx="371" cy="201" r="6" fill="#bfdbfe"/>
  <circle cx="422" cy="201" r="6" fill="#bfdbfe"/>
  <circle cx="371" cy="252" r="6" fill="#bfdbfe"/>
  <circle cx="422" cy="252" r="6" fill="#bfdbfe"/>

  <text x="340" y="335" text-anchor="middle" font-size="24" letter-spacing="0.12em" fill="#faf9f5" font-weight="500">pblocks</text>
</svg>
