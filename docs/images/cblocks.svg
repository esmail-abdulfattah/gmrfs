<svg width="100%" viewBox="215 35 250 250" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>cblocks icon</title>
  <desc>An icon for cblocks: many covariance blocks collapsed into a single output, shown as a large centered stack of translucent layers fronted by one bright lattice.</desc>

  <rect x="220" y="40" width="240" height="240" rx="48" fill="#0f172a"/>

  <!-- Stack of 5 layers (back-to-front), each offset (+10, +10) -->
  <rect x="250" y="70"  width="140" height="140" rx="20" fill="#60a5fa" opacity="0.08" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.40"/>
  <rect x="260" y="80"  width="140" height="140" rx="20" fill="#60a5fa" opacity="0.11" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.55"/>
  <rect x="270" y="90"  width="140" height="140" rx="20" fill="#60a5fa" opacity="0.14" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.70"/>
  <rect x="280" y="100" width="140" height="140" rx="20" fill="#60a5fa" opacity="0.17" stroke="#60a5fa" stroke-width="1.4" stroke-opacity="0.80"/>

  <!-- Front block: bright with lattice -->
  <rect x="290" y="110" width="140" height="140" rx="20" fill="#60a5fa" opacity="0.22"/>
  <line x1="320" y1="140" x2="400" y2="140" stroke="#60a5fa" stroke-width="2.5"/>
  <line x1="320" y1="220" x2="400" y2="220" stroke="#60a5fa" stroke-width="2.5"/>
  <line x1="320" y1="140" x2="320" y2="220" stroke="#60a5fa" stroke-width="2.5"/>
  <line x1="400" y1="140" x2="400" y2="220" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="320" cy="140" r="7" fill="#bfdbfe"/>
  <circle cx="400" cy="140" r="7" fill="#bfdbfe"/>
  <circle cx="320" cy="220" r="7" fill="#bfdbfe"/>
  <circle cx="400" cy="220" r="7" fill="#bfdbfe"/>

  <text x="340" y="335" text-anchor="middle" font-size="24" letter-spacing="0.12em" fill="#faf9f5" font-weight="500">cblocks</text>
</svg>
