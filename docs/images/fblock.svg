<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="98" fill="url(#bg3)" stroke="#1e40af" stroke-width="1.5"/>

  <!-- Faint full grid (matrix background) -->
  <g stroke="#1e3a8a" stroke-width="0.6" opacity="0.45">
    <line x1="36" y1="36"  x2="36"  y2="164"/>
    <line x1="62" y1="36"  x2="62"  y2="164"/>
    <line x1="88" y1="36"  x2="88"  y2="164"/>
    <line x1="114" y1="36" x2="114" y2="164"/>
    <line x1="140" y1="36" x2="140" y2="164"/>
    <line x1="166" y1="36" x2="166" y2="164"/>
    <line x1="36"  y1="36"  x2="166" y2="36"/>
    <line x1="36"  y1="62"  x2="166" y2="62"/>
    <line x1="36"  y1="88"  x2="166" y2="88"/>
    <line x1="36"  y1="114" x2="166" y2="114"/>
    <line x1="36"  y1="140" x2="166" y2="140"/>
    <line x1="36"  y1="164" x2="166" y2="164"/>
  </g>

  <!-- Block 1: 2×2, blue -->
  <rect x="36" y="36" width="52" height="52" rx="4"
        fill="#1d4ed8" opacity="0.88" stroke="#60a5fa" stroke-width="1.4"/>
  <line x1="62" y1="36" x2="62" y2="88" stroke="#93c5fd" stroke-width="0.9" opacity="0.55"/>
  <line x1="36" y1="62" x2="88" y2="62" stroke="#93c5fd" stroke-width="0.9" opacity="0.55"/>

  <!-- Block 2: 2×2, teal -->
  <rect x="88" y="88" width="52" height="52" rx="4"
        fill="#0e7490" opacity="0.88" stroke="#22d3ee" stroke-width="1.4"/>
  <line x1="114" y1="88"  x2="114" y2="140" stroke="#a5f3fc" stroke-width="0.9" opacity="0.55"/>
  <line x1="88"  y1="114" x2="140" y2="114" stroke="#a5f3fc" stroke-width="0.9" opacity="0.55"/>

  <!-- Block 3: 1×1, indigo -->
  <rect x="140" y="140" width="26" height="26" rx="4"
        fill="#4338ca" opacity="0.88" stroke="#a5b4fc" stroke-width="1.4"/>

  <!-- Zero dots (off-diagonal sparsity) -->
  <circle cx="101" cy="49"  r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="127" cy="49"  r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="153" cy="49"  r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="153" cy="75"  r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="49"  cy="101" r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="49"  cy="127" r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="49"  cy="153" r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="75"  cy="153" r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="153" cy="101" r="2" fill="#1e3a8a" opacity="0.7"/>
  <circle cx="101" cy="153" r="2" fill="#1e3a8a" opacity="0.7"/>

  <!-- Label -->
  <text x="100" y="184" text-anchor="middle" font-family="Inter,sans-serif"
        font-size="22" font-weight="800" fill="#ffffff" letter-spacing="-0.5">fBlock</text>
</svg>
